  .container {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  .stage {

    inset: 0;
    background: #fff;
  }
  .stage video {

    object-fit: cover;
    transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1);

  .stage video.hidden { opacity: 0; pointer-events: none; }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  .text-block {
    position: absolute;
    opacity: 0;
    transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .text-block.active { opacity: 1; }

  /* ── Shared styles ── */
  .logo {

    top: 3vh; left: 2vw;
    font-weight: 800;

  .title { font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; }

  .desc {

  .tag-label {
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--gray);

    display: inline-block;
    font-weight: 600;

    letter-spacing: 0.04em;

    border-radius: 999px;
    background: var(--black);

  .val-row {

    gap: 0;

  .val-num {
    font-weight: 900;

    letter-spacing: -0.02em;

  .val-label {

  .card {

  const loopVideo = document.getElementById('loopVideo');
  const transVideo = document.getElementById('transVideo');
  const overlay = document.getElementById('overlay');

  let currentIndex = 0;
  let isTransitioning = false;
  let scrollAccumulator = 0;
  const SCROLL_THRESHOLD = 40;

  function renderOverlay(index) {
    overlay.innerHTML = sections[index].html;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        overlay.querySelectorAll('.text-block').forEach(el => el.classList.add('active'));
      });
    });
  }

  function hideAllMedia() {
    loopVideo.classList.add('hidden');
    transVideo.classList.add('hidden');
    loopVideo.pause();
    transVideo.pause();
  }

  function showLoop(sec) {
    hideAllMedia();
    loopVideo.src = VIDEO_BASE + sec.loop;
    loopVideo.classList.remove('hidden');
    loopVideo.currentTime = 0;
    loopVideo.play().catch(() => {});
  }

  function playTransition(sec) {
    if (!sec.trans) return;
    isTransitioning = true;
    overlay.querySelectorAll('.text-block').forEach(el => el.classList.remove('active'));

    transVideo.src = VIDEO_BASE + sec.trans;
    transVideo.classList.remove('hidden');
    transVideo.currentTime = 0;
    transVideo.playbackRate = 4;
    transVideo.play().catch(() => {});

    transVideo.onended = () => {
      transVideo.classList.add('hidden');
      transVideo.onended = null;
      isTransitioning = false;
      showLoop(sections[currentIndex]);
      renderOverlay(currentIndex);
    };
  }

  function advance() {
    if (isTransitioning) return;
    const sec = sections[currentIndex];
    if (currentIndex < sections.length - 1 && sec.trans) {
      playTransition(sec);
      currentIndex++;
    }
  }

  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    scrollAccumulator += e.deltaY;
    if (scrollAccumulator > SCROLL_THRESHOLD) {
      scrollAccumulator = 0;
      advance();
    }
  }, { passive: false });

  let touchStartY = 0;
  window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
  window.addEventListener('touchend', (e) => {
    if (touchStartY - e.changedTouches[0].clientY > 40) advance();
  });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') advance();
  });

  showLoop(sections[0]);
  renderOverlay(0);
})();
