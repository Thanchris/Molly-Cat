<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molly · Scrollytelling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f6f4ef;
      --ink: #050505;
      --muted: #3f3d39;
      --line: rgba(5, 5, 5, 0.16);
      --accent: #ff7a00;
      --white: #fffaf2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: var(--paper);
      font-family: "Inter", "Noto Sans SC", system-ui, sans-serif;
      color: var(--ink);
      scroll-behavior: auto;
    }

    body {
      min-height: 800vh;
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--paper);
    }

    .video-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    video {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 90ms linear;
      background: var(--paper);
    }

    #loopVideo,
    #loopVideoB {
      z-index: 1;
    }

    #transitionVideo {
      z-index: 2;
    }

    video.is-visible {
      opacity: 1;
    }

    .content {
      position: absolute;
      inset: clamp(22px, 4vw, 48px);
      z-index: 8;
      display: grid;
      grid-template-rows: auto 1fr auto;
      pointer-events: none;
    }

    .nav {
      display: flex;
      align-items: center;
      font-weight: 900;
      letter-spacing: 0.005em;
    }

    .brand {
      font-size: clamp(24px, 2.4vw, 38px);
    }

    .links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 3vw, 42px);
      font-size: clamp(12px, 1vw, 15px);
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 18px;
      font-size: clamp(12px, 1vw, 15px);
      letter-spacing: 0;
    }

    .login {
      display: inline-flex;
      align-items: center;
      height: 42px;
      padding: 0 24px;
      background: var(--ink);
      color: var(--white);
    }

    .scene {
      position: absolute;
      inset: clamp(90px, 12vh, 130px) 0 clamp(78px, 11vh, 112px);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 360ms ease, transform 360ms ease;
    }

    .scene.is-active {
      opacity: 1;
      transform: translateY(0);
    }

    .kicker,
    .small,
    .body-copy,
    .stat-copy,
    .bottom-label {
      font-weight: 800;
      letter-spacing: 0.004em;
      line-height: 1.28;
    }

    .kicker {
      position: absolute;
      left: 0;
      top: 0;
      width: min(310px, 30vw);
      font-size: clamp(14px, 1.15vw, 18px);
      color: var(--muted);
    }

    .title {
      position: absolute;
      left: 0;
      top: clamp(62px, 10vh, 98px);
      width: min(520px, 48vw);
      font-family: "Anton", "Noto Sans SC", Impact, sans-serif;
      font-size: clamp(58px, 8.2vw, 132px);
      line-height: .86;
      letter-spacing: 0.006em;
      text-transform: uppercase;
    }

    .title .cn {
      font-family: "Noto Sans SC", "Anton", sans-serif;
      font-weight: 900;
      letter-spacing: -0.12em;
    }

    .title .accent,
    .stat-title .accent {
      color: var(--accent);
    }

    .body-copy {
      position: absolute;
      left: 0;
      bottom: clamp(12px, 2vh, 36px);
      width: min(370px, 34vw);
      font-size: clamp(14px, 1.22vw, 20px);
    }

    .socials {
      display: flex;
      gap: 24px;
      margin-top: 28px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .stat {
      position: absolute;
      right: 0;
      width: min(370px, 33vw);
      text-align: center;
    }

    .stat.top {
      top: clamp(10px, 2vh, 28px);
    }

    .stat.bottom {
      bottom: clamp(72px, 12vh, 128px);
    }

    .stat-title {
      font-family: "Anton", "Noto Sans SC", Impact, sans-serif;
      font-size: clamp(34px, 4vw, 64px);
      line-height: .94;
      letter-spacing: 0.008em;
      text-transform: uppercase;
    }

    .stat-copy {
      margin: 18px auto 0;
      max-width: 300px;
      font-size: clamp(13px, 1.08vw, 18px);
      color: var(--muted);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      height: 62px;
      margin-top: 30px;
      padding: 0 10px 0 28px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--white);
      font-weight: 900;
      letter-spacing: 0.012em;
      font-size: 18px;
    }

    .cta-mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--white);
      color: var(--ink);
      font-size: 28px;
      line-height: 1;
    }

    .progress {
      position: fixed;
      left: clamp(26px, 4vw, 52px);
      right: clamp(26px, 4vw, 52px);
      bottom: clamp(18px, 3.2vw, 36px);
      z-index: 70;
      height: 2px;
      background: rgba(5, 5, 5, 0.13);
      pointer-events: none;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent);
    }

    .scroll-note {
      position: fixed;
      right: clamp(30px, 4.2vw, 58px);
      bottom: clamp(30px, 4.5vw, 58px);
      z-index: 71;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(5, 5, 5, .42);
      writing-mode: vertical-rl;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: grid;
      place-items: center;
      background: var(--paper);
      font-family: "Anton", "Noto Sans SC", sans-serif;
      font-size: clamp(42px, 8vw, 116px);
      letter-spacing: 0.006em;
      transition: opacity 360ms ease, visibility 360ms ease;
    }

    .loading.is-done {
      opacity: 0;
      visibility: hidden;
    }

    @media (max-width: 860px) {
      body {
        min-height: 800vh;
      }

      .content {
        inset: 24px;
      }

      .nav {
        grid-template-columns: 1fr auto;
      }

      .links {
        display: none;
      }

      .actions span:first-child {
        display: none;
      }

      .login {
        height: 36px;
        padding: 0 16px;
      }

      .scene {
        inset: 82px 0 88px;
      }

      .kicker,
      .body-copy {
        width: 52vw;
      }

      .title {
        width: 70vw;
        top: 86px;
      }

      .body-copy {
        bottom: 84px;
      }

      .stat {
        right: 0;
        width: 42vw;
      }

      .stat.top {
        top: 8px;
      }

      .stat.bottom {
        bottom: 12px;
      }

      .stat-copy {
        display: none;
      }


      .scroll-note {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Molly scrollytelling">
    <div class="video-wrap" aria-hidden="true">
      <video id="loopVideo" muted playsinline loop preload="auto"></video>
      <video id="loopVideoB" muted playsinline loop preload="auto"></video>
      <video id="transitionVideo" muted playsinline preload="auto"></video>
    </div>

    <section class="content">
      <nav class="nav" aria-label="页面导航">
        <div class="brand">Molly</div>
      </nav>

      <div id="scenes"></div>

    </section>
  </main>

  <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
  <div class="scroll-note" aria-hidden="true">Scroll to meet Molly</div>
  <div class="loading" id="loading">Molly</div>

  <script>
    (() => {
      const chapters = [
        {
          loop: "01.mp4",
          transition: "01转场.mp4",
          kicker: "Molly Intro · 01",
          title: '<span class="cn">柔软<br>宇宙</span>',
          line: "在柔软的宇宙里，Molly慢慢醒来",
          body: "用户未滚动时，我先在这里循环呼吸。白色毛毛、蓝眼睛，还有一点点刚睡醒的庄重。",
          topTitle: "0.5 YEARS OLD",
          topCopy: "永远半岁，永远认真地把世界闻一遍。",
          bottomTitle: "100% FLUFF",
          bottomCopy: "蓬松指数满分，情绪也满分。"
        },
        {
          loop: "02.mp4",
          transition: "02转场.mp4",
          kicker: "First Look · 02",
          title: '<span class="cn">靠近<br><span class="accent">一点</span></span>',
          line: "你轻轻靠近时，我把心跳藏进胡须里",
          body: "别被安静骗到。Molly 正在观察你：鞋子、语气、手里有没有小零食。",
          topTitle: "50+ BLINKS",
          topCopy: "慢眨眼是猫语里的温柔确认。",
          bottomTitle: "5+ SECONDS",
          bottomCopy: "允许被注视，但只能一小会儿。"
        },
        {
          loop: "03.mp4",
          transition: "03转场.mp4",
          kicker: "Daily Philosophy · 03",
          title: 'THE ART<br>OF <span class="accent">SITTING</span>',
          line: "阳光挪到脚边，我决定暂时原谅世界",
          body: "坐着不是发呆，是把阳光、空气和人类的脚步声，都整理成今天的猫科哲学。",
          topTitle: "ZEN MODE",
          topCopy: "尾巴卷成问号，答案暂时保密。",
          bottomTitle: "NO RUSH",
          bottomCopy: "一只猫的时间，从不为闹钟服务。"
        },
        {
          loop: "04.mp4",
          transition: "04转场.mp4",
          kicker: "Live Moment · 04",
          title: 'TINY<br><span class="accent">OOPS</span>',
          line: "偶尔小小失误，也要保持猫咪体面",
          body: "舔爪失败、重心偏移、假装无事发生。Molly 的优雅包括：迅速忘记刚才那一秒。",
          topTitle: "12:00 PM",
          topCopy: "午间固定节目：认真整理一只爪爪。",
          bottomTitle: "ZERO EVIDENCE",
          bottomCopy: "你什么都没看见，对吧？"
        },
        {
          loop: "05.mp4",
          transition: "05转场.mp4",
          kicker: "Sleep Forecast · 05",
          title: 'YAWN<br><span class="accent">#42</span>',
          line: "哈欠轻轻打开以后，梦就自动上线",
          body: "午后三点的阳光像一张邀请函。打完这个哈欠，我就要去梦里巡视领地。",
          topTitle: "2:54 PM",
          topCopy: "天气晴，适合认真犯困。",
          bottomTitle: "NAP READY",
          bottomCopy: "任何柔软表面，都可能成为床。"
        },
        {
          loop: "06.mp4",
          transition: "06转场.mp4",
          kicker: "Signature Color · 06",
          title: 'YARN &<br><span class="accent">COLLAR</span>',
          line: "紫色毛线球，是我今天追逐的月亮",
          body: "同一种紫色不是巧合，是品味。拍一下，拖一下，最后把毛线乱成小型星系。",
          topTitle: "#FF7A00",
          topCopy: "参考图的橙色高光，变成 Molly 的舞台光。",
          bottomTitle: "∞ HOURS",
          bottomCopy: "玩具的生命周期，由我决定。"
        },
        {
          loop: "07.mp4",
          transition: "07转场.mp4",
          kicker: "Friendly Gesture · 07",
          title: 'HI-<br><span class="accent">FIVE</span>',
          line: "我认真伸出爪爪，批准你做朋友",
          body: "击掌可以，摸头要预约。Molly 的亲近不是随便给的，但今天你刚好通过了审核。",
          topTitle: "3 / DAY",
          topCopy: "每日击掌额度有限，先到先得。",
          bottomTitle: "PAW PASS",
          bottomCopy: "恭喜获得小猫临时通行证。"
        },
        {
          loop: "08.mp4",
          transition: null,
          kicker: "Secret Ending · 08",
          title: 'BRING<br><span class="accent">SNACKS</span>',
          line: "如果你带来零食，我就愿意坐近一点",
          body: "滚到底后我会留在这里循环播放。故事讲完了，但小猫的期待没有结束。",
          topTitle: "CTA UNLOCKED",
          topCopy: "参考图里的按钮与标签，在最后一幕出现。",
          bottomTitle: "WITH LOVE",
          bottomCopy: "— Molly, probably",
          cta: true
        }
      ];

      const scenesEl = document.getElementById("scenes");
      const loopVideo = document.getElementById("loopVideo");
      const loopVideoB = document.getElementById("loopVideoB");
      const transitionVideo = document.getElementById("transitionVideo");
      const progressBar = document.getElementById("progressBar");
      const loading = document.getElementById("loading");
      const loopVideos = [loopVideo, loopVideoB];

      let activeScene = -1;
      let activeLoop = -1;
      let activeLoopVideo = 0;
      let activeTransition = -1;
      let currentChapter = 0;
      let queuedChapter = 0;
      let isTransitioning = false;
      let suppressScrollUntil = 0;
      let raf = 0;

      document.body.style.minHeight = `${chapters.length * 100}vh`;

      chapters.forEach((chapter, index) => {
        const scene = document.createElement("article");
        scene.className = "scene";
        scene.dataset.index = String(index);
        scene.innerHTML = `
          <p class="kicker">${chapter.kicker}<br>${chapter.line}</p>
          <h1 class="title">${chapter.title}</h1>
          <div class="stat top">
            <h2 class="stat-title">${chapter.topTitle}</h2>
            <p class="stat-copy">${chapter.topCopy}</p>
          </div>
          <div class="stat bottom">
            <h2 class="stat-title">${chapter.bottomTitle}</h2>
            <p class="stat-copy">${chapter.bottomCopy}</p>
          </div>
          <div class="body-copy">
            <p>${chapter.body}</p>
            ${chapter.cta ? '<div class="cta">Start today <span class="cta-mark">→</span></div>' : ""}
            ${index === 0 ? '<div class="socials"><span>f</span><span>◎</span><span>▶</span></div>' : ""}
          </div>
        `;
        scenesEl.appendChild(scene);
      });

      const sceneEls = [...document.querySelectorAll(".scene")];
      const videoCache = new Map();

      function asset(name) {
        return encodeURI(name);
      }

      function preloadVideos() {
        chapters.forEach((chapter) => {
          [chapter.loop, chapter.transition].filter(Boolean).forEach((src) => {
            if (videoCache.has(src)) return;
            const video = document.createElement("video");
            video.preload = "auto";
            video.muted = true;
            video.playsInline = true;
            video.src = asset(src);
            videoCache.set(src, video);
          });
        });
      }

      function setScene(index) {
        if (index === activeScene) return;
        activeScene = index;
        sceneEls.forEach((scene, sceneIndex) => {
          scene.classList.toggle("is-active", sceneIndex === index);
        });
      }

      function waitForFrame(video) {
        if (video.readyState >= 2) {
          return Promise.resolve();
        }
        return new Promise((resolve) => {
          video.addEventListener("loadeddata", resolve, { once: true });
        });
      }

      function loadLoop(video, index) {
        const src = asset(chapters[index].loop);
        if (video.dataset.chapter !== String(index)) {
          video.dataset.chapter = String(index);
          video.src = src;
          video.currentTime = 0;
          video.load();
        }
        return waitForFrame(video);
      }

      function setTransitionSpeed() {
        transitionVideo.defaultPlaybackRate = 3;
        transitionVideo.playbackRate = 3;
      }

      function showLoop(index) {
        currentChapter = index;
        const visibleIndex = loopVideos[activeLoopVideo].dataset.chapter === String(index)
          ? activeLoopVideo
          : 1 - activeLoopVideo;
        const visibleVideo = loopVideos[visibleIndex];

        activeLoop = index;
        activeTransition = -1;
        transitionVideo.pause();
        transitionVideo.classList.remove("is-visible");
        setScene(index);

        loadLoop(visibleVideo, index).then(() => {
          activeLoopVideo = visibleIndex;
          loopVideos.forEach((video, videoIndex) => {
            video.classList.toggle("is-visible", videoIndex === activeLoopVideo);
          });
          visibleVideo.play().catch(() => {});
        });
      }

      function playTransition(index, nextIndex) {
        const chapter = chapters[index];
        if (!chapter.transition) {
          showLoop(nextIndex);
          return;
        }

        isTransitioning = true;
        activeTransition = index;
        currentChapter = index;
        setScene(nextIndex);

        const currentLoopVideo = loopVideos[activeLoopVideo];
        const nextLoopVideoIndex = 1 - activeLoopVideo;
        const nextLoopVideo = loopVideos[nextLoopVideoIndex];
        activeLoop = nextIndex;
        currentLoopVideo.classList.add("is-visible");

        transitionVideo.pause();
        transitionVideo.classList.remove("is-visible");
        transitionVideo.src = asset(chapter.transition);
        setTransitionSpeed();
        transitionVideo.currentTime = 0;

        Promise.all([loadLoop(nextLoopVideo, nextIndex), waitForFrame(transitionVideo)]).then(() => {
          activeLoopVideo = nextLoopVideoIndex;
          nextLoopVideo.classList.add("is-visible");
          nextLoopVideo.play().catch(() => {});
          currentLoopVideo.classList.remove("is-visible");
          setTransitionSpeed();
          transitionVideo.classList.add("is-visible");
          transitionVideo.play().catch(() => {});
        });
        transitionVideo.load();
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function scrollToChapter(index) {
        const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        suppressScrollUntil = performance.now() + 520;
        window.scrollTo({
          top: (index / (chapters.length - 1)) * maxScroll,
          behavior: "auto"
        });
        progressBar.style.width = `${(index / (chapters.length - 1)) * 100}%`;
      }

      function update() {
        raf = 0;
        if (performance.now() < suppressScrollUntil) {
          return;
        }

        const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        const progress = clamp(window.scrollY / maxScroll, 0, 1);
        const targetChapter = Math.round(progress * (chapters.length - 1));

        progressBar.style.width = `${progress * 100}%`;
        queuedChapter = targetChapter;

        if (isTransitioning || targetChapter === currentChapter) {
          return;
        }

        if (targetChapter > currentChapter) {
          playTransition(currentChapter, currentChapter + 1);
          return;
        }

        showLoop(targetChapter);
      }

      function requestUpdate() {
        if (!raf) raf = requestAnimationFrame(update);
      }

      transitionVideo.addEventListener("ended", () => {
        const nextChapter = Math.min(activeTransition + 1, chapters.length - 1);
        transitionVideo.classList.remove("is-visible");
        currentChapter = nextChapter;
        activeTransition = -1;
        setScene(nextChapter);
        loopVideos[activeLoopVideo].classList.add("is-visible");
        loopVideos[activeLoopVideo].play().catch(() => {});
        isTransitioning = false;
        queuedChapter = nextChapter;
        scrollToChapter(nextChapter);
      });

      transitionVideo.addEventListener("loadedmetadata", setTransitionSpeed);
      transitionVideo.addEventListener("ratechange", setTransitionSpeed);

      loopVideos.forEach((video) => {
        video.addEventListener("canplay", () => {
          if (video.classList.contains("is-visible")) {
            video.play().catch(() => {});
          }
        });
      });

      window.addEventListener("scroll", requestUpdate, { passive: true });
      window.addEventListener("resize", requestUpdate);
      window.addEventListener("keydown", (event) => {
        if (event.key !== "ArrowDown" && event.key !== "ArrowUp" && event.key !== "PageDown" && event.key !== "PageUp") return;
        const direction = event.key === "ArrowDown" || event.key === "PageDown" ? 1 : -1;
        const current = Math.round((window.scrollY / Math.max(1, document.documentElement.scrollHeight - window.innerHeight)) * (chapters.length - 1));
        const next = clamp(current + direction, 0, chapters.length - 1);
        window.scrollTo({ top: (next / (chapters.length - 1)) * (document.documentElement.scrollHeight - window.innerHeight), behavior: "smooth" });
      });

      preloadVideos();
      showLoop(0);
      update();

      window.addEventListener("load", () => {
        setTimeout(() => loading.classList.add("is-done"), 420);
      });
      setTimeout(() => loading.classList.add("is-done"), 1800);
    })();
  </script>
</body>
</html>
